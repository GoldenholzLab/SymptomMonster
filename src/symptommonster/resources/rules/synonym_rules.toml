# Tier-2 synonym rules: variant phrasing mapped to a canonical symptom term.
#
# Rules are tried in order and the first whose pattern matches the preprocessed
# (lowercased) term wins, so more specific rules come before the broader ones
# they would otherwise be caught by. Patterns are case-insensitive regular
# expressions and stay clinically generic, with no drug, indication, or cohort
# terms. Some distinctions are kept apart on purpose: suicidal versus homicidal
# ideation, headache versus migraine, nausea versus vomiting, numbness versus
# abnormal sensation, and tremor versus ataxia.

[[rule]]
canonical = "Suicidal ideation"
patterns = ['\bsuicid']

[[rule]]
canonical = "Homicidal ideation"
patterns = ['\bhomicid']

[[rule]]
canonical = "Migraine"
patterns = ['\bmigrain']

[[rule]]
